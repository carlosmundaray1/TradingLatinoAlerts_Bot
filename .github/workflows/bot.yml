name: TradingLatino HMM Bot 24/7

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      assets:
        description: 'Assets a procesar (separados por espacio)'
        required: false
        default: 'BTC-USD ETH-USD XRP-USD SOL-USD'

env:
  ENABLE_TELEGRAM: "true"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        asset: [BTC-USD, ETH-USD, XRP-USD, SOL-USD]
      fail-fast: false
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy plotly hmmlearn yfinance requests

      # Restaura el estado HMM de la ejecucion anterior para que el bot
      # detecte CAMBIOS de senal (no reporta como "inicial" si la senal
      # es la misma que la corrida previa). Sin esto se generaria spam.
      - name: Restaurar estado HMM
        uses: actions/cache@v4
        id: state-cache
        with:
          path: .hmm_state_${{ matrix.asset }}.json
          key: hmm-state-${{ matrix.asset }}-${{ github.run_id }}
          restore-keys: |
            hmm-state-${{ matrix.asset }}-

      - name: Run HMM bot for ${{ matrix.asset }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BROWSER: /bin/true
        run: python tradinglatino_hmm_clean_v4_Cl47.py --asset ${{ matrix.asset }} --headless
        timeout-minutes: 15

      - name: Guardar estado HMM para proxima ejecucion
        if: always()
        uses: actions/cache@v4
        with:
          path: .hmm_state_${{ matrix.asset }}.json
          key: hmm-state-${{ matrix.asset }}-${{ github.run_id }}
